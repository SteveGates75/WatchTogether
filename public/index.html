<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Chat with Friend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            background: #1a1a1a;
            color: white;
        }

        #login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2c2c2c;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #login-container h2 {
            margin-bottom: 1rem;
            color: #fff;
        }

        #login-container input {
            padding: 0.8rem;
            margin-bottom: 1rem;
            width: 100%;
            border: none;
            border-radius: 4px;
            background: #3c3c3c;
            color: white;
            font-size: 16px;
        }

        #login-container button {
            padding: 0.8rem 1.5rem;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        #app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 80px;
            background: #2c2c2c;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .call-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #3c3c3c;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .call-button.active {
            background: #ed4245;
        }

        .call-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #2c2c2c;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: #3c3c3c;
            border-radius: 4px;
        }

        .message strong {
            color: #5865f2;
            margin-right: 0.5rem;
        }

        .message small {
            color: #999;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .message-input {
            display: flex;
            gap: 0.5rem;
        }

        .message-input input {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 4px;
            background: #3c3c3c;
            color: white;
            font-size: 16px;
        }

        .message-input button {
            padding: 0.8rem 1.5rem;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #call-status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #2c2c2c;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }

        #call-status.active {
            display: block;
            background: #ed4245;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            
            .call-button {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>🎧 Audio Chat</h2>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off">
        <button onclick="login()">Join Chat</button>
    </div>

    <div id="app-container" style="display: none;">
        <div class="sidebar">
            <button class="call-button" id="callBtn" onclick="toggleCall()" title="Start Audio Call">🎧</button>
        </div>
        
        <div class="main-content">
            <div class="chat-container">
                <div id="messages"></div>
                <div class="message-input">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="call-status">🔴 Call in progress</div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
