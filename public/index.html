<!DOCTYPE html>
<html>
<head>
  <title>WatchTogether Mesh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="joinScreen">
  <h2>Join Room</h2>
  <input id="username" placeholder="Username">
  <input id="roomId" placeholder="Room ID">
  <button onclick="joinRoom()">Join</button>
</div>

<div id="app" style="display:none;">

  <div class="top-bar">
    <span id="roomLabel"></span>
    <button onclick="copyInvite()">Copy Invite</button>
  </div>

  <div class="main">
    <video id="screenVideo" autoplay playsinline></video>

    <div class="sidebar">
      <h3>Users</h3>
      <div id="users"></div>

      <h3>Chat</h3>
      <div id="chat"></div>
      <input id="chatInput" placeholder="Type message..." onkeydown="if(event.key==='Enter') sendMessage()">
    </div>
  </div>

  <div class="controls">
    <button onclick="toggleMic()">Mute</button>
    <button onclick="startScreenShare()">Share Screen</button>
    <button onclick="leaveRoom()">Leave</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
