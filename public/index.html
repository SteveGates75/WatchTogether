<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Screen Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
        }

        #login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }

        #login-container h2 {
            margin-bottom: 20px;
            color: #5865f2;
        }

        #login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background: #3a3a3a;
            color: white;
        }

        #login-container button {
            width: 100%;
            padding: 10px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #login-container button:hover {
            background: #4752c4;
        }

        #app-container {
            display: none;
            height: 100vh;
        }

        .sidebar {
            width: 80px;
            background: #2a2a2a;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .sidebar button {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: none;
            background: #3a3a3a;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sidebar button.active {
            background: #ed4245;
        }

        .sidebar button.sharing {
            background: #3ba55d;
        }

        .sidebar button:hover {
            transform: scale(1.1);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2a2a2a;
            border-radius: 10px;
            padding: 20px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            background: #3a3a3a;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .message strong {
            color: #5865f2;
            margin-right: 10px;
        }

        .message small {
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }

        .message.system {
            background: #2a2a2a;
            color: #888;
            font-style: italic;
            text-align: center;
        }

        .message-input {
            display: flex;
            gap: 10px;
        }

        .message-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #3a3a3a;
            color: white;
        }

        .message-input button {
            padding: 10px 20px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #status-container {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }

        .status-badge {
            background: #2a2a2a;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }

        .status-badge.active {
            display: block;
        }

        .status-badge.connected {
            background: #3ba55d;
        }

        .status-badge.connecting {
            background: #faa81a;
        }

        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        #video-container.active {
            display: flex;
        }

        #remote-video {
            flex: 1;
            width: 100%;
            object-fit: contain;
        }

        .video-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
        }

        .video-controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .video-controls button:first-child {
            background: #5865f2;
            color: white;
        }

        .video-controls button:last-child {
            background: #ed4245;
            color: white;
        }

        #join-btn {
            display: none;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        #join-btn.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>🎬 Screen Share</h2>
        <input type="text" id="username" placeholder="Enter your name">
        <button onclick="login()">Join Chat</button>
    </div>

    <div id="app-container">
        <div class="sidebar">
            <button id="callBtn" onclick="toggleCall()" title="Audio Call">🎧</button>
            <button id="screenBtn" onclick="toggleScreen()" title="Share Screen">📺</button>
        </div>
        
        <div class="main-content">
            <div class="chat-container">
                <div id="messages"></div>
                <div class="message-input">
                    <input type="text" id="messageInput" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="status-container">
        <div id="audio-status" class="status-badge"></div>
        <div id="screen-status" class="status-badge"></div>
    </div>

    <button id="join-btn" onclick="joinScreen()">📺 Join Screen Share</button>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <div class="video-controls">
            <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
            <button onclick="closeVideo()">Close</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
