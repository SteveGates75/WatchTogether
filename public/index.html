<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Video Call</title>
    <style>
        body { margin:0; background:#111; color:white; font-family:sans-serif; display:flex; }
        #login { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; padding:20px; border-radius:8px; }
        #login input, #login button { padding:10px; margin:5px; }
        #app { display:none; width:100%; height:100vh; }
        #sidebar { width:200px; background:#1a1a1a; padding:10px; overflow-y:auto; }
        #sidebar h3 { color:#aaa; margin-bottom:10px; }
        .user-item { padding:8px; margin-bottom:5px; background:#2a2a2a; border-radius:5px; cursor:pointer; }
        .user-item:hover { background:#3a3a3a; }
        #main { flex:1; display:flex; flex-direction:column; }
        #videos { display:flex; justify-content:center; gap:10px; padding:10px; }
        video { width:45%; max-width:400px; background:#333; border-radius:8px; }
        #controls { text-align:center; padding:10px; }
        button { padding:10px 20px; margin:5px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer; }
        button.hangup { background:#f44336; }
        #status { text-align:center; color:#aaa; }
    </style>
</head>
<body>
    <div id="login">
        <h3>Enter your name</h3>
        <input type="text" id="username" placeholder="Name">
        <button onclick="login()">Join</button>
    </div>

    <div id="app">
        <div id="sidebar">
            <h3>Online Users</h3>
            <div id="user-list"></div>
        </div>
        <div id="main">
            <div id="videos">
                <video id="localVideo" autoplay playsinline muted></video>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
            <div id="controls">
                <button class="hangup" onclick="hangUp()">📴 Hang Up</button>
            </div>
            <div id="status">Not connected</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
