<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4K Screen Share - Optimized</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            background: #0a0a0a;
            color: white;
        }

        #login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #login-container h2 {
            margin-bottom: 1.5rem;
            color: #fff;
            font-size: 24px;
        }

        #login-container input {
            padding: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        #login-container input:focus {
            outline: 2px solid #5865f2;
        }

        #login-container button {
            padding: 1rem 1.5rem;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
        }

        #login-container button:hover {
            background: #4752c4;
        }

        #app-container {
            display: flex;
            height: 100vh;
            display: none;
        }

        .sidebar {
            width: 80px;
            background: #1a1a1a;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 5;
        }

        .sidebar button {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #2a2a2a;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .sidebar button.active {
            background: #ed4245;
        }

        .sidebar button.sharing {
            background: #3ba55d;
        }

        .sidebar button.video-active {
            background: #5865f2;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(88, 101, 242, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); }
        }

        .sidebar button:hover {
            transform: scale(1.05);
        }

        .sidebar button::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            background: #2a2a2a;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            z-index: 100;
        }

        .sidebar button:hover::after {
            display: block;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 0.5rem;
            padding: 0.75rem;
            background: #2a2a2a;
            border-radius: 8px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message strong {
            color: #5865f2;
            margin-right: 0.5rem;
        }

        .message small {
            color: #888;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        .message.system {
            background: #2a2a2a;
            color: #888;
            font-style: italic;
        }

        .message.video-offer {
            background: #5865f233;
            border-left: 4px solid #5865f2;
            cursor: pointer;
            transition: background 0.3s;
        }

        .message.video-offer:hover {
            background: #5865f255;
        }

        .message.video-offer .join-btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .message.video-offer .join-btn:hover {
            background: #4752c4;
        }

        .message-input {
            display: flex;
            gap: 0.5rem;
        }

        .message-input input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        .message-input input:focus {
            outline: 2px solid #5865f2;
        }

        .message-input button {
            padding: 1rem 1.5rem;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .message-input button:hover {
            background: #4752c4;
        }

        #status-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 400px;
        }

        .status-badge {
            background: #1a1a1a;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 12px;
            display: none;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
            border: 1px solid #333;
        }

        .status-badge.active {
            display: flex;
        }

        .status-badge.connecting { 
            background: #faa81a;
            color: black;
        }
        
        .status-badge.connected { 
            background: #3ba55d;
        }
        
        .status-badge.error { 
            background: #ed4245;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #bitrate-status {
            background: #2a2a2a;
        }

        #audio-visualizer {
            width: 100px;
            height: 30px;
            background: #2a2a2a;
            border-radius: 15px;
            overflow: hidden;
            display: none;
        }

        #audio-visualizer.active {
            display: block;
        }

        .visualizer-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3ba55d, #5865f2);
            transition: width 0.1s;
        }

        /* Screen Container */
        #screen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        #screen-container.active {
            display: flex;
        }

        #screen-container:fullscreen {
            background: black;
            padding: 0;
        }

        #screen-container:-webkit-full-screen {
            background: black;
        }

        #screen-container:-moz-full-screen {
            background: black;
        }

        .video-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            position: relative;
            width: 100%;
            height: calc(100% - 80px);
        }

        #remote-screen {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            background: black;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .screen-controls {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #333;
            z-index: 10;
        }

        .screen-controls button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .screen-controls button:first-child {
            background: #5865f2;
            color: white;
        }

        .screen-controls button:first-child:hover {
            background: #4752c4;
            transform: scale(1.05);
        }

        .screen-controls button:last-child {
            background: #ed4245;
            color: white;
        }

        .screen-controls button:last-child:hover {
            background: #c13b3e;
            transform: scale(1.05);
        }

        .quality-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #3ba55d;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            backdrop-filter: blur(5px);
            z-index: 20;
            border: 1px solid #3ba55d33;
        }

        .quality-indicator.visible {
            display: block;
        }

        .fullscreen-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
            border: 1px solid #ffffff33;
            animation: fadeInOut 3s ease-in-out;
            z-index: 15;
        }

        .fullscreen-hint.show {
            display: flex;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        /* Join Video Button */
        #join-video-btn {
            display: none;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            align-items: center;
            gap: 8px;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            transition: all 0.3s;
        }

        #join-video-btn:hover {
            background: #4752c4;
            transform: scale(1.05);
        }

        #join-video-btn.active {
            display: flex;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            
            .sidebar button {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .sidebar button::after {
                left: 45px;
            }

            .screen-controls {
                padding: 10px 15px;
            }

            .screen-controls button {
                padding: 10px 20px;
                font-size: 14px;
            }

            #status-container {
                max-width: 300px;
            }

            #join-video-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>🎬 4K Screen Share</h2>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off">
        <button onclick="login()">Join Chat</button>
    </div>

    <div id="app-container">
        <div class="sidebar">
            <button id="callBtn" onclick="toggleCall()" data-tooltip="Audio Call">🎧</button>
            <button id="screenBtn" onclick="toggleScreenShare()" data-tooltip="Share Screen">📺</button>
            <button id="joinVideoBtn" onclick="joinVideo()" data-tooltip="Join Video" class="video-active">📱 Join Video</button>
        </div>
        
        <div class="main-content">
            <div class="chat-container">
                <div id="messages"></div>
                <div class="message-input">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="status-container">
        <div id="call-status" class="status-badge"></div>
        <div id="screen-status" class="status-badge"></div>
        <div id="video-status" class="status-badge"></div>
        <div id="bitrate-status" class="status-badge">📊 0 Kbps</div>
        <div id="audio-visualizer" class="status-badge">
            <div class="visualizer-bar" id="visualizer-bar"></div>
        </div>
    </div>

    <div id="screen-container">
        <div class="video-wrapper">
            <video id="remote-screen" autoplay playsinline></video>
            <div class="quality-indicator" id="quality-indicator">📺 1080p 60fps</div>
            <div class="fullscreen-hint" id="fullscreen-hint">
                ⬛ Click fullscreen for better view
            </div>
        </div>
        <div class="screen-controls">
            <button id="fullscreenBtn" onclick="toggleFullScreen()">
                <span id="fullscreenIcon">⛶</span> Fullscreen
            </button>
            <button onclick="closeScreenView()">
                ✕ Close
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
