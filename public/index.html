<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Discord Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-container">
        <h2>Welcome to Discord Clone</h2>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off">
        <button onclick="login()">Join Chat</button>
    </div>

    <div id="app-container" style="display: none;">
        <div class="sidebar">
            <h3>Online Users</h3>
            <div id="users-list"></div>
            <div class="call-controls">
                <button onclick="startCall()">Start Video Call</button>
                <button onclick="shareScreen()">Share Screen</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="chat-container">
                <div id="messages"></div>
                <div class="message-input">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
            
            <div class="video-container" id="video-container" style="display: none;">
                <div class="video-grid">
                    <div class="video-box">
                        <video id="local-video" autoplay muted playsinline></video>
                        <p>You</p>
                    </div>
                    <div class="video-box" id="remote-videos"></div>
                </div>
                <button onclick="endCall()" class="end-call">End Call</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
