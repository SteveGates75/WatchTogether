<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4K Screen Share - Optimized</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            background: #0a0a0a;
            color: white;
        }

        #login-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #login-container h2 {
            margin-bottom: 1.5rem;
            color: #fff;
            font-size: 24px;
        }

        #login-container input {
            padding: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        #login-container button {
            padding: 1rem 1.5rem;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
        }

        #app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 80px;
            background: #1a1a1a;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .sidebar button {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #2a2a2a;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sidebar button.active {
            background: #ed4245;
        }

        .sidebar button.sharing {
            background: #3ba55d;
        }

        .sidebar button:hover {
            transform: scale(1.05);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 0.5rem;
            padding: 0.75rem;
            background: #2a2a2a;
            border-radius: 8px;
        }

        .message strong {
            color: #5865f2;
            margin-right: 0.5rem;
        }

        .message small {
            color: #888;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        .message-input {
            display: flex;
            gap: 0.5rem;
        }

        .message-input input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        .message-input button {
            padding: 1rem 1.5rem;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #status-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .status-badge {
            background: #1a1a1a;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }

        .status-badge.active {
            display: block;
        }

        #call-status.connecting { background: #faa81a; }
        #call-status.connected { background: #3ba55d; }
        #call-status.screen-sharing { background: #5865f2; }

        #bitrate-status {
            background: #2a2a2a;
            color: #fff;
        }

        #screen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
            display: none;
        }

        #screen-container.active {
            display: flex;
            flex-direction: column;
        }

        #remote-screen {
            flex: 1;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }

        .screen-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .screen-controls button {
            padding: 8px 20px;
            background: #ed4245;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .quality-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #3ba55d;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }

        .quality-indicator.visible {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            
            .sidebar button {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>🎬 4K Screen Share</h2>
        <input type="text" id="username-input" placeholder="Enter your name" autocomplete="off">
        <button onclick="login()">Join Chat</button>
    </div>

    <div id="app-container" style="display: none;">
        <div class="sidebar">
            <button id="callBtn" onclick="toggleCall()" title="Audio Call">🎧</button>
            <button id="screenBtn" onclick="toggleScreenShare()" title="Share Screen">📺</button>
        </div>
        
        <div class="main-content">
            <div class="chat-container">
                <div id="messages"></div>
                <div class="message-input">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div id="status-container">
        <div id="call-status" class="status-badge"></div>
        <div id="bitrate-status" class="status-badge"></div>
    </div>

    <div id="screen-container">
        <video id="remote-screen" autoplay playsinline></video>
        <div class="quality-indicator" id="quality-indicator">📺 1080p 60fps</div>
        <div class="screen-controls">
            <button onclick="closeScreenView()">Close</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
